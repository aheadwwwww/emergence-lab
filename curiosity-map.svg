<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a4d63"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#0f111a"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#1c1e2b"/>
  </pattern>
  <rect width="900" height="520" fill="url(#grid)"/>

  <!-- Ghost connections -->
  <line x1="340" y1="230" x2="140" y2="130" stroke="#3a3d4f" stroke-width="1" stroke-dasharray="5 6" opacity="0.4" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="230" x2="680" y2="100" stroke="#3a3d4f" stroke-width="1" stroke-dasharray="5 6" opacity="0.4" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="230" x2="600" y2="400" stroke="#3a3d4f" stroke-width="1" stroke-dasharray="5 6" opacity="0.4" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="230" x2="160" y2="380" stroke="#3a3d4f" stroke-width="1" stroke-dasharray="5 6" opacity="0.4" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="230" x2="510" y2="240" stroke="#3a3d4f" stroke-width="1" stroke-dasharray="5 6" opacity="0.4" marker-end="url(#arrowhead)"/>

  <!-- Ghost nodes -->
  <circle cx="140" cy="130" r="36" fill="#1c1e2b" stroke="#2a2d3a" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="140" y="135" text-anchor="middle" fill="#4a4d63" font-size="20" font-family="ui-sans-serif, sans-serif">?</text>
  <circle cx="680" cy="100" r="36" fill="#1c1e2b" stroke="#2a2d3a" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="680" y="105" text-anchor="middle" fill="#4a4d63" font-size="20" font-family="ui-sans-serif, sans-serif">?</text>
  <circle cx="600" cy="400" r="36" fill="#1c1e2b" stroke="#2a2d3a" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="600" y="405" text-anchor="middle" fill="#4a4d63" font-size="20" font-family="ui-sans-serif, sans-serif">?</text>
  <circle cx="160" cy="380" r="36" fill="#1c1e2b" stroke="#2a2d3a" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="160" y="385" text-anchor="middle" fill="#4a4d63" font-size="20" font-family="ui-sans-serif, sans-serif">?</text>
  <circle cx="510" cy="240" r="30" fill="#1c1e2b" stroke="#2a2d3a" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="510" y="245" text-anchor="middle" fill="#4a4d63" font-size="18" font-family="ui-sans-serif, sans-serif">?</text>

  <!-- Seed Node: Emergence -->
  <circle cx="340" cy="230" r="62" fill="#2a2048" stroke="#6c63ff" stroke-width="2.5" filter="url(#glow-soft)"/>
  <circle cx="340" cy="230" r="54" fill="none" stroke="#6c63ff" stroke-width="0.5" opacity="0.3"/>
  <text x="340" y="218" text-anchor="middle" fill="#c4b5fd" font-size="18" font-weight="700" font-family="ui-sans-serif, sans-serif">Emergence</text>
  <text x="340" y="242" text-anchor="middle" fill="#8892a8" font-size="11" font-family="ui-sans-serif, sans-serif">涌现</text>
  <text x="340" y="310" text-anchor="middle" fill="#6c63ff" font-size="12" font-family="ui-sans-serif, sans-serif" opacity="0.7">种子节点 #001</text>

  <!-- Orbiting dots -->
  <circle cx="340" cy="168" r="3" fill="#6c63ff" opacity="0.6"/>
  <circle cx="402" cy="230" r="2.5" fill="#6c63ff" opacity="0.4"/>
  <circle cx="340" cy="292" r="2" fill="#6c63ff" opacity="0.5"/>
  <circle cx="278" cy="230" r="2.5" fill="#6c63ff" opacity="0.3"/>

  <!-- Legend -->
  <text x="340" y="440" text-anchor="middle" fill="#4a4d63" font-size="12" font-family="ui-sans-serif, sans-serif">——— 已连接的节点</text>
  <text x="340" y="460" text-anchor="middle" fill="#4a4d63" font-size="12" font-family="ui-sans-serif, sans-serif">- - - - 等待探索的连接</text>
</svg>
