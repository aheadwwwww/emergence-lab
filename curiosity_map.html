<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>🧠 好奇心地图 — Interactive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; color: #c8c8d0; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }
#container { width: 100vw; height: 100vh; position: relative; }
#info { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.85); padding: 12px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); text-align: center; font-size: 13px; color: #888; pointer-events: none; z-index: 10; }
#info strong { color: #ddd; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="container">
  <canvas id="canvas"></canvas>
  <div id="info">🧠 好奇心地图 · <strong id="currentNode"></strong> · 拖拽节点探索</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const nodeLabel = document.getElementById('currentNode');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === DATA ===
const NODES = [
  { id: 1,  label: 'Emergence',         cat: 'foundation', color: '#ffd700', x: 0, y: 0 },
  { id: 2,  label: "Langton's Ant",     cat: 'demo', color: '#ff8c42', x: 0, y: 0 },
  { id: 3,  label: 'Edge of Chaos',     cat: 'theory', color: '#5dade2', x: 0, y: 0 },
  { id: 4,  label: 'Self-Organized Criticality', cat: 'theory', color: '#5dade2', x: 0, y: 0 },
  { id: 5,  label: 'CA Classes',        cat: 'theory', color: '#5dade2', x: 0, y: 0 },
  { id: 6,  label: 'Turmites',          cat: 'demo', color: '#ff8c42', x: 0, y: 0 },
  { id: 7,  label: 'Boids',             cat: 'demo', color: '#ff8c42', x: 0, y: 0 },
  { id: 8,  label: 'Turing Patterns',   cat: 'nature', color: '#58d68d', x: 0, y: 0 },
  { id: 9,  label: 'Conway GoL',        cat: 'demo', color: '#ff8c42', x: 0, y: 0 },
  { id: 10, label: 'Computational Emergence', cat: 'theory', color: '#5dade2', x: 0, y: 0 },
  { id: 11, label: 'Grokking',          cat: 'ml', color: '#af7ac5', x: 0, y: 0 },
  { id: 12, label: 'Scaling Laws',      cat: 'ml', color: '#af7ac5', x: 0, y: 0 },
  { id: 13, label: 'Attention Mechanism', cat: 'ml', color: '#af7ac5', x: 0, y: 0 },
  { id: 14, label: 'Computational Universe', cat: 'theory', color: '#5dade2', x: 0, y: 0 },
  { id: 15, label: 'Cognitive Gap',     cat: 'phil', color: '#f1948a', x: 0, y: 0 },
  { id: 16, label: 'Self-Reference',    cat: 'phil', color: '#f1948a', x: 0, y: 0 },
  { id: 17, label: 'Creativity',        cat: 'phil', color: '#f1948a', x: 0, y: 0 },
  { id: 18, label: 'Hallucination',     cat: 'phil', color: '#f1948a', x: 0, y: 0 },
  { id: 19, label: 'Strange Loops',     cat: 'phil', color: '#f1948a', x: 0, y: 0 },
  { id: 20, label: 'Artificial Life',   cat: 'alife', color: '#ffd700', x: 0, y: 0 },
  { id: 21, label: 'Digital Evolution', cat: 'alife', color: '#ffd700', x: 0, y: 0 },
  { id: 22, label: 'Open-Endedness',    cat: 'alife', color: '#ffd700', x: 0, y: 0 },
  { id: 23, label: 'Embodiment',        cat: 'phil', color: '#f1948a', x: 0, y: 0 },
  { id: 24, label: 'Predictive Processing', cat: 'neurosci', color: '#85c1e9', x: 0, y: 0 },
  { id: 25, label: 'Hard Problem',      cat: 'phil', color: '#f1948a', x: 0, y: 0 },
  { id: 26, label: 'Fun & Play',        cat: 'meta', color: '#f7dc6f', x: 0, y: 0 },
];

const EDGES = [
  [1,2],[1,3],[1,4],[1,5],[1,7],[1,9],[1,10],[1,15],[1,20],
  [2,6],[2,20],
  [3,4],[3,5],[3,10],[3,14],[3,15],
  [4,22],
  [8,20],
  [9,10],[9,20],
  [10,14],
  [11,12],[11,24],
  [12,21],
  [13,14],[13,24],
  [14,15],[14,19],
  [15,16],[15,17],[15,18],[15,19],[15,23],[15,25],
  [16,17],[16,19],[16,22],
  [17,18],[17,19],[17,26],
  [18,19],[18,24],[18,25],
  [19,20],[19,22],[19,23],[19,24],
  [20,21],[20,22],[20,23],
  [21,22],[21,24],
  [22,23],[22,24],[22,26],
  [23,24],[23,25],
  [24,25],[24,26],
  [25,26],
];

// === PHYSICS ===
const W = () => canvas.width;
const H = () => canvas.height;

const nodes = NODES.map(n => ({
  ...n,
  vx: 0, vy: 0,
  r: 14 + (n.label.length > 12 ? 4 : 0),
}));

let dragging = null;
let dragOffX = 0, dragOffY = 0;

// Layout: concentric circles
function initLayout() {
  const cats = [...new Set(nodes.map(n => n.cat))];
  const catNodes = {};
  nodes.forEach(n => {
    if (!catNodes[n.cat]) catNodes[n.cat] = [];
    catNodes[n.cat].push(n);
  });
  const catOrder = ['foundation','demo','theory','nature','ml','phil','alife','neurosci','meta'];
  catOrder.reverse();
  let ring = 0;
  catOrder.forEach(cat => {
    const list = catNodes[cat] || [];
    if (!list.length) return;
    const baseR = 120 + ring * 110;
    list.forEach((n, i) => {
      const angle = (i / list.length) * 2 * Math.PI - Math.PI/2;
      n.x = W()/2 + baseR * Math.cos(angle);
      n.y = H()/2 + baseR * Math.sin(angle);
    });
    ring++;
  });
}
initLayout();

function simulate() {
  const repulsion = 12000;
  const attraction = 0.003;
  const damping = 0.85;
  const minDist = 60;

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      let dx = nodes[j].x - nodes[i].x;
      let dy = nodes[j].y - nodes[i].y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      let force = repulsion / (dist * dist);
      if (dist > 350) force = 0;
      nodes[i].vx -= force * (dx/dist);
      nodes[i].vy -= force * (dy/dist);
      nodes[j].vx += force * (dx/dist);
      nodes[j].vy += force * (dy/dist);
    }
  }

  // Edge attraction
  EDGES.forEach(([a,b]) => {
    const na = nodes.find(n => n.id === a);
    const nb = nodes.find(n => n.id === b);
    if (!na || !nb) return;
    let dx = nb.x - na.x;
    let dy = nb.y - na.y;
    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
    na.vx += attraction * dx;
    na.vy += attraction * dy;
    nb.vx -= attraction * dx;
    nb.vy -= attraction * dy;
  });

  // Center gravity
  nodes.forEach(n => {
    n.vx += (W()/2 - n.x) * 0.0005;
    n.vy += (H()/2 - n.y) * 0.0005;
  });

  // Update
  nodes.forEach(n => {
    n.vx *= damping;
    n.vy *= damping;
    n.x += n.vx;
    n.y += n.vy;
    // Keep in bounds
    n.x = Math.max(60, Math.min(W()-60, n.x));
    n.y = Math.max(60, Math.min(H()-60, n.y));
  });
}

// === RENDER ===
function draw() {
  ctx.clearRect(0, 0, W(), H());

  // Background
  const grad = ctx.createRadialGradient(W()/2, H()/2, 50, W()/2, H()/2, Math.max(W(),H())*0.7);
  grad.addColorStop(0, '#0f0f20');
  grad.addColorStop(1, '#06060e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W(), H());

  // Edges
  EDGES.forEach(([a,b]) => {
    const na = nodes.find(n => n.id === a);
    const nb = nodes.find(n => n.id === b);
    if (!na || !nb) return;
    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.lineTo(nb.x, nb.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(n => {
    const r = n.r;
    const selected = dragging === n;
    
    // Glow
    const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r*3);
    glow.addColorStop(0, n.color + '30');
    glow.addColorStop(0.5, n.color + '08');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r*3, 0, Math.PI*2);
    ctx.fill();

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = selected ? n.color : n.color + 'cc';
    ctx.fill();
    ctx.strokeStyle = selected ? '#fff' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.stroke();

    // Label
    const fontSize = n.label.length > 12 ? 9 : 11;
    ctx.font = `${fontSize}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 3;
    ctx.fillText(n.label, n.x, n.y);
    ctx.shadowBlur = 0;

    // Cat label
    ctx.font = '8px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillText('#'+String(n.id).padStart(3,'0'), n.x, n.y + r + 12);
  });
}

// === INTERACTION ===
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for (const n of nodes) {
    const dx = mx - n.x;
    const dy = my - n.y;
    if (dx*dx + dy*dy < (n.r+8)*(n.r+8)) {
      dragging = n;
      dragOffX = mx - n.x;
      dragOffY = my - n.y;
      n.vx = 0; n.vy = 0;
      nodeLabel.textContent = `#${n.id} ${n.label}`;
      break;
    }
  }
});

canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  dragging.x = e.clientX - rect.left - dragOffX;
  dragging.y = e.clientY - rect.top - dragOffY;
  nodeLabel.textContent = `#${dragging.id} ${dragging.label}`;
});

canvas.addEventListener('mouseup', () => {
  if (dragging) {
    dragging.vx = 0;
    dragging.vy = 0;
  }
  dragging = null;
});

// Touch
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = t.clientX - rect.left;
  const my = t.clientY - rect.top;
  for (const n of nodes) {
    const dx = mx - n.x;
    const dy = my - n.y;
    if (dx*dx + dy*dy < (n.r+12)*(n.r+12)) {
      dragging = n;
      dragOffX = mx - n.x;
      dragOffY = my - n.y;
      nodeLabel.textContent = `#${n.id} ${n.label}`;
      break;
    }
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!dragging) return;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  dragging.x = t.clientX - rect.left - dragOffX;
  dragging.y = t.clientY - rect.top - dragOffY;
  nodeLabel.textContent = `#${dragging.id} ${dragging.label}`;
}, { passive: true });

canvas.addEventListener('touchend', () => {
  dragging = null;
}, { passive: true });

// === LOOP ===
let frame = 0;
function loop() {
  simulate();
  draw();
  frame++;
  requestAnimationFrame(loop);
}
loop();

// Resize handler
window.addEventListener('resize', () => {
  setTimeout(initLayout, 100);
});
</script>
</body>
</html>
