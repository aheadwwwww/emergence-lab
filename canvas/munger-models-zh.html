    steps: ["Define the Macro and Micro Settings:: What is the broad context (e.g., a futuristic dystopia, medieval Europe) and the specific, immediate location (e.g., a grimy alley, a grand ballroom)?", "Establish the \\\"Rules\\\" of the Setting:: What are the physical, social, and cultural laws of this place? What is considered normal? What is forbidden? These rules create conflict.", "Use Setting to Reveal Character:: How does a character react to their environment? Their comfort or discomfort, their ability to navigate or their feeling of being trapped, reveals who they are.", "Make the Setting a Force of Antagonism:: The setting itself can be an obstacle. A harsh desert, an oppressive cityscape, or a rigid social structure can be the primary source of conflict for the protagonist.", "Show, Don\\'t Just Tell:: Instead of describing the setting in a block of text, weave the details into the action. Show the crumbling bricks, the smell of rain, the sound of distant sirens, as the character experiences them."],
    coaching: ["\\\"How does this specific location limit or empower the character?\\\"", "\\\"What are the \\'unwritten rules\\' of this place, and what happens if a character breaks them?\\\"", "\\\"If this setting were a character, what would its personality be?\\\"", "\\\"How can we use the weather or the time of day to amplify the mood of this scene?\\\"", "\\\"What details in this environment can the character use to their advantage or be hindered by?\\\""]
  },
  'm70': {
    title: 'Performance',
    title_en: 'Performance',
    category: 'Art',
    description: 'Performance is the practice of executing a task with skill and presence in a specific moment. It is the art of the ephemeral, where the action itself, rather than a physical artifact, is the work. A performance is a live, embodied event that is unique to its time and place, and its meaning is co-created by the performer\'s actions and the audience\'s active presence and interpretation.',
    avoid: '(or Use with Caution):** - **When a Permanent Record is Essential:** If the primary goal is to create a fixed, repeatable, and perfectly polished product, the inherent variability and ephemerality of live performance can be a liability. - **When Preparation is Lacking:** A poor performance can do more damage to a reputation than no performance at all. The vulnerability of the live moment requires rigorous practice and preparation.',
    keywords: ["Public speaking", "surgery", "sports", "musical concerts", "negotiations", "crisis management."],
    steps: ["Define the Goal:: What is the intended outcome of the performance? Is it to persuade, entertain, heal, or achieve a specific target?", "Master the Craft (Practice):: Performance is built on a foundation of deep, repetitive practice until the core skills become second nature. This frees the performer to be present in the moment.", "Embrace the Ephemeral (Presence):: During the performance, let go of the rigid plan and respond to the live environment. Be fully present and adapt to the unexpected.", "Engage the Audience:: Acknowledge the presence of the audience (or stakeholders). Their energy and feedback are part of the event. Create a feedback loop with them.", "Review and Reflect:: Since a performance cannot be perfectly replicated, the learning happens after the event. Reflect on what worked, what didn\\'t, and how the context influenced the outcome."],
    coaching: ["\\\"What is the single most important thing we want the audience to feel or do as a result of this performance?\\\"", "\\\"Have we practiced enough that we can stop thinking about the mechanics and start focusing on the meaning?\\\"", "\\\"What are the potential points of failure, and how can we prepare for them?\\\"", "\\\"How are we creating a connection with our audience, rather than just talking at them?\\\"", "\\\"What did we learn from that performance that we can apply to the next one?\\\""]
  },
  'm71': {
    title: 'Seeing the Front',
    title_en: 'Seeing the Front',
    category: 'War',
    description: 'This model emphasizes the importance of gaining firsthand knowledge before making critical decisions, rather than relying solely on secondhand information like reports, maps, or advisors. Just as a general must see the battlefield, a leader must see the \"front lines\" of their business—be it the factory floor, the customer service desk, or the user\'s experience. This direct exposure reveals nuances, challenges, and opportunities that are lost in translation through layers of bureaucracy.',
    avoid: '(or Use with Caution):** - **When Your Presence is Disruptive:** In highly specialized or delicate situations (e.g., a surgical operating room, a sensitive negotiation), a leader\'s presence might interfere with the experts\' work. - **For Highly Strategic, Abstract Decisions:** When the \"front\" is a conceptual space (e.g., long-term financial markets), direct observation is less valuable than high-quality data analysis and expert consultation. - **When It Creates Bottlenecks:** If every minor decision requires a personal visit, you become the bottleneck. Trusting your team and the systems you\'ve built is crucial.',
    keywords: ["领导力", "operational issues", "流程改进", "customer feedback", "战略规划", "产品开发"],
    steps: ["Identify the \\\"Front\\\":: Determine where the most critical work is happening or where the most value is created in your organization.", "Go See for Yourself:: Schedule time to personally observe the situation. Leave the boardroom and go to the source.", "Observe and Listen:: Pay attention to the details. Talk to the people who are doing the work. Ask open-ended questions and listen more than you talk.", "Compare Map to Territory:: How does what you\\'re seeing differ from the reports and data you receive? Identify the gaps in your \\\"map.\\\"", "Calibrate Your Decisions:: Use your firsthand knowledge to inform your strategic decisions and to better interpret the secondhand information you receive in the future."],
    coaching: ["\\\"What are the reports telling us, and what would we see if we went to the \\'front\\'?\\\"", "\\\"When was the last time you spoke directly with the people doing this work?\\\"", "\\\"What are the subtle but important details we might be missing by staying in the office?\\\"", "\\\"How can we make \\'seeing the front\\' a regular part of our decision-making process?\\\"", "\\\"Is our understanding of the problem based on data, or on a true understanding of the reality?\\\""]
  },
  'm72': {
    title: 'Asymmetric Warfare',
    title_en: 'Asymmetric Warfare',
    category: 'War',
    description: 'Asymmetric warfare describes a conflict where two sides have vastly different resources, strategies, and goals. The weaker side, unable to compete on conventional terms, leverages its unique advantages—like speed, local knowledge, or a higher tolerance for risk—to exploit the stronger opponent\'s weaknesses. Instead of a head-on-battle, it \"plays by different rules,\" using tactics like guerrilla warfare, disruptive innovation, or targeted marketing to achieve a disproportionate impact.',
    avoid: '(or Use with Caution):** - **When It Erodes Ethical Grounding:** Asymmetric tactics can involve deception and subversion. If these tactics violate your core ethical principles or alienate key stakeholders, they can cause long-term reputational damage that outweighs short-term gains. - **When You Are the Incumbent:** If you are the larger, more established entity, adopting asymmetric tactics can seem hypocritical or dishonorable, potentially damaging morale and public trust. - **When It Leads to Escalation:** An unconventional attack can provoke an overwhelming, disproportionate response from the stronger power, leading to a worse outcome.',
    keywords: ["Startup competition", "disruptive innovation", "guerrilla marketing", "cybersecurity", "insurgency", "negotiations"],
    steps: ["Analyze the Imbalance:: Clearly identify the core asymmetries. What resources, rules, and assumptions favor your opponent? What unique advantages do you possess?", "Identify the Opponent\\'s Center of Gravity vs. Your Own:: What is most critical to them (e.g., reputation, a specific product line, public confidence)? What is most critical to you (e.g., survival, user growth)?", "Define Different Rules:: Brainstorm unconventional tactics that sidestep your opponent\\'s strengths and target their vulnerabilities. Think about what they would least expect.", "Execute with Speed and Surprise:: Asymmetric tactics rely on agility. Act quickly and decisively before the larger opponent can adapt or respond effectively.", "Control the Narrative:: Shape the perception of the conflict. Use propaganda, PR, or social media to frame your actions in a favorable light and your opponent\\'s in a negative one."],
    coaching: ["\\\"What if we refuse to fight on their terms? What would that look like?\\\"", "\\\"What are the \\'unwritten rules\\' in our industry, and what happens if we break them?\\\"", "\\\"How can we use our small size and speed as a weapon?\\\"", "\\\"Where is our opponent most vulnerable to a surprise attack?\\\"", "\\\"How can we achieve a massive psychological impact with a minimal resource investment?\\\""]
  },
  'm73': {
    title: 'Two-Front War',
    title_en: 'Two-Front War',
    category: 'War',
    description: 'A two-front war occurs when a single entity is forced to fight two separate opponents, or address two major, distinct challenges, at the same time. The core insight is that this splits resources, attention, and focus, weakening the ability to succeed on either front. The goal is nearly always to avoid fighting a two-front war yourself, while potentially seeking to force one upon an adversary.',
    avoid: '(or Use with Caution):** - **This is a model of a situation to be AVOIDED.** The primary use of this model is as a warning. Actively avoid putting yourself or your organization into a two-front war. - **Don\'t Underestimate an Opponent:** Attempting to force a two-front war on a competitor can be a powerful strategy, but if they have sufficient resources, it may not be effective and could backfire. - **Internal vs. External:** The most common two-front war for an organization is battling external competitors while also fighting internal dysfunction or political battles.',
    keywords: ["Resource allocation", "战略规划", "competitive analysis", "冲突解决", "work-life balance", "internal politics."],
    steps: ["Identify Your Fronts:: List all the major challenges or opponents you are currently facing. Are you fighting a key competitor while also dealing with a major internal crisis? That\\'s a two-front war.", "Assess the Resource Drain:: Quantify the attention, capital, and energy being consumed by each front. Be honest about the cost of dividing your focus.", "Prioritize Ruthlessly:: You cannot give 100% to both fronts. Decide which front is more critical to your long-term survival and success.", "Seek to Close a Front:: Can you achieve a truce or resolution on one front? Can you solve the internal issue quickly to focus on the external threat? Or can you delay a confrontation with one competitor?", "If Unavoidable, Allocate Deliberately:: If you must fight on two fronts, do not try to achieve overwhelming victory on both simultaneously. Allocate just enough resources to hold one front stable while you seek a decisive victory on the other."],
    coaching: ["\\\"Are we currently fighting a war on two or more fronts? What are they?\\\"", "\\\"Which of these challenges poses the greatest existential threat to us?\\\"", "\\\"What internal conflicts are draining energy that should be aimed at our competitors?\\\"", "\\\"Can we declare a temporary truce in one area to allow us to win in another?\\\"", "\\\"How are we actively trying to force our main competitor into a two-front war?\\\""]
  },
  'm74': {
    title: 'Counterinsurgency',
    title_en: 'Counterinsurgency',
    category: 'War',
    description: 'Counterinsurgency is the set of tactics used by a larger power to defeat an insurgency. Crucially, it\'s not just about fighting the insurgents themselves, but about winning the \"hearts and minds\" of the population from which the insurgency draws its strength and support. A successful counterinsurgency focuses on providing security, legitimacy, and economic well-being, thereby isolating the insurgents from their base and making their narrative irrelevant.',
    avoid: '(or Use with Caution):** - **Without Deep Cultural Understanding:** Applying this model without a profound understanding of the local population\'s grievances, culture, and needs is likely to fail and can be perceived as tone-deaf and imperialistic. - **Without a Long-Term Commitment:** Counterinsurgency is slow, expensive, and requires immense patience. If you lack the will or resources for a multi-year effort, a force-based approach may be less costly, though likely less effective. - **When the \"Government\" is Illegitimate:** If the entity in power is corrupt or fundamentally unjust, no amount of counterinsurgency tactics will win the support of the people. You cannot save a system that is rotten at its core.',
    keywords: ["Change management", "corporate turnarounds", "winning public opinion", "combating disinformation", "community engagement", "brand reputation management."],
    steps: ["Identify the \\\"Insurgents\\\" and the \\\"Population\\\":: Who are the active opponents, and who is the broader group they are trying to influence?", "Understand the Root Grievances:: Why does the insurgency have support? What are the legitimate complaints of the population that the insurgents are exploiting?", "Secure and Serve the Population:: The first job is to provide security and stability. Then, focus on addressing the core grievances by improving governance, services, or opportunities. This builds trust.", "Isolate the Insurgents:: As you win the population\\'s support, the insurgents will lose their cover, their resources, and their legitimacy. Actively separate them from the people.", "Promote a Better Narrative:: Offer a compelling and positive vision for the future that is more attractive than the one offered by the insurgents."],
    coaching: ["\\\"Are we just fighting the \\'enemy\\', or are we trying to win over the \\'people\\'?\\\"", "\\\"What are the legitimate grievances that are fueling this opposition?\\\"", "\\\"Instead of asking how to defeat the insurgents, let\\'s ask: How do we make the population support us?\\\"", "\\\"Are our actions building trust or creating more resentment?\\\"", "\\\"Is our \\'governance\\' seen as legitimate and fair by the people we are trying to lead?\\\""]
  },
  'm75': {
    title: 'Mutually Assured Destruction',
    title_en: 'Mutually Assured Destruction',
    category: 'War',
    description: 'Mutually Assured Destruction (MAD) is a state of equilibrium where two opposing sides possess such destructive power that any attack by one would be met with a retaliatory strike that ensures the complete annihilation of both. Paradoxically, this immense destructive capacity creates a tense but stable peace, as neither side has a rational incentive to initiate conflict. The \"game\" is so high-stakes that the only winning move is not to play.',
    avoid: '(or Use with Caution):** - **This is a model of a situation to be managed, not created.** The goal is to avoid scenarios where MAD is the only thing preventing catastrophe. - **With Irrational Actors:** The logic of MAD completely breaks down if one party is not rational, does not fear its own destruction, or is operating on different information. - **When Accidents are Possible:** It creates a fragile stability where technical malfunctions, misinterpretations, or unauthorized actions can lead to an irreversible, catastrophic outcome. - **When the \"Destruction\" is Not Symmetrical:** If one side has significantly less to lose, their willingness to risk destruction might be higher, unbalancing the equation.',
    keywords: ["Deterrence", "price wars", "high-stakes negotiations", "systemic risk", "geopolitical standoffs", "existential threats."],
    steps: ["Identify the Players and Their Power:: Who are the actors, and what is their credible capacity to inflict unacceptable damage on each other?", "Assess the \\\"Cost of War\\\":: Is the outcome of a full-scale conflict truly a lose-lose scenario for all parties involved?", "Ensure Deterrent Credibility:: For the stalemate to hold, each side must be absolutely convinced that the other has the capability and the will to retaliate.", "Establish Clear Red Lines and Communication:: Create clear boundaries and maintain open channels of communication to prevent miscalculation, which is the greatest risk in a MAD scenario.", "Look for De-escalation Paths:: Actively seek ways to reduce the tension and the level of destructive capability, as the MAD equilibrium is inherently high-risk."],
    coaching: ["\\\"If we go into an all-out price war, what would be the end result for us and for them?\\\"", "\\\"Are we in a standoff where the only thing preventing conflict is the fear of mutual ruin?\\\"", "\\\"What is the \\'nuclear option\\' in this situation, and what would happen if someone used it?\\\"", "\\\"How do we know the other side is as rational as we are?\\\"", "\\\"What small mistake could escalate this situation into a complete disaster?\\\""]
  },
  'm76': {
    title: 'Trust',
    title_en: 'Trust',
    category: 'Human Nature',
    description: 'Trust is the confident reliance on the integrity, strength, ability, or character of a person or thing. It\'s the bedrock of all social and economic interactions, enabling cooperation, reducing complexity, and making systems more efficient. The modern world, from family units to global markets, is built on a complex web of trust.',
    avoid: '(or Use with Caution):** - **In High-Stakes, Low-Information Scenarios:** Avoid granting immediate, high levels of trust when you have little information about the other party and the consequences of failure are severe. - **When Incentives are Misaligned:** Be cautious when the other party\'s incentives directly conflict with your own. Their need to win may outweigh their commitment to being trustworthy. - **Without a System for Verification:** \"Trust, but verify\" is a crucial addendum. Blind trust without any mechanism for accountability is often misplaced and can be exploited.',
    keywords: ["Delegation", "teamwork", "谈判", "relationships", "investment", "contracts"],
    steps: ["Assess the Stakes:: What is the potential upside of trusting and the potential downside of being wrong?", "Evaluate Incentives and Reputation:: What is the other party\\'s track record? What do they gain by being trustworthy and what do they lose by breaking that trust?", "Start Small:: Grant trust in small, incremental steps. Use small \\\"tests\\\" to gauge reliability before committing to larger-scale trust.", "Establish Clear Expectations:: Define the terms of the relationship or agreement explicitly. Ambiguity is the enemy of trust.", "Continuously Verify and Adjust:: Don\\'t treat trust as a one-time decision. Pay attention to actions, not just words, and be prepared to adjust your level of trust based on new evidence."],
    coaching: ["\\\"What is the evidence for and against trusting this person or system?\\\"", "\\\"What are their incentives to be trustworthy in this specific situation?\\\"", "\\\"What is the smallest, safest way we can test for trustworthiness here?\\\"", "\\\"Are we confusing a feeling of familiarity with genuine, earned trust?\\\"", "\\\"What would need to happen for us to lose trust? What is our \\'tripwire\\'?\\\""]
  },
  'm77': {
    title: 'Bias from Incentives',
    title_en: 'Bias from Incentives',
    category: 'Human Nature',
    description: 'This model describes the pervasive human tendency to distort our thinking, perception, and conclusions in the direction of our own self-interest. When we have a stake in the outcome, our minds unconsciously find ways to believe whatever is most convenient or profitable for us. As Upton Sinclair said, \"It is difficult to get a man to understand something when his salary depends upon his not understanding it.\"',
    avoid: '(or Use with Caution):** - **When Taking Advice:** Be extremely skeptical of advice from people who stand to gain financially from your decision (e.g., a financial advisor selling a specific product, a real estate agent). - **In Your Own High-Stakes Decisions:** Actively fight this bias in yourself. When you want something to be true, your brain will work overtime to convince you it is. - **When Judging Others:** Before attributing someone\'s actions to malice or stupidity, first consider what incentives might be driving their behavior.',
    keywords: ["Sales pitches", "negotiations", "financial advice", "corporate governance", "performance reviews", "punditry"],
    steps: ["Identify the Key Players:: Who are the decision-makers and influencers in this situation?", "Follow the Incentives:: For each player, determine how they are compensated or what they stand to gain/lose. Look beyond stated intentions to the underlying incentive structure.", "Question the Narrative:: How might the incentives be shaping the arguments, data, and conclusions being presented?", "逆向问题:: Ask, \\\"What narrative or conclusion would serve their incentives perfectly?\\\" and see how closely it matches what they are saying.", "Seek Disinterested Opinions:: Find a knowledgeable, independent third party with no stake in the outcome and get their perspective."],
    coaching: ["\\\"Who benefits financially if we choose this option?\\\"", "\\\"How is this person/team compensated, and how might that be influencing their recommendation?\\\"", "\\\"What would the argument be from someone who had the opposite set of incentives?\\\"", "\\\"Are we making this decision based on objective facts, or is our desire for a certain outcome clouding our judgment?\\\"", "\\\"Let\\'s ignore their words for a moment and just look at their incentives. What do the incentives predict they would do or say?\\\""]
  },
  'm78': {
    title: 'Pavlovian Association',
    title_en: 'Pavlovian Association',
    category: 'Human Nature',
    description: 'Named after Ivan Pavlov\'s experiments with dogs, this model describes how our minds create a powerful, often unconscious link between a neutral stimulus and an emotional or physiological response. We learn to associate things, and this conditions our reactions. A bell can make a dog salivate, and in the same way, a brand logo, a song, or a certain type of news can trigger feelings of trust, nostalgia, or fear in humans, independent of the actual merit of the subject.',
    avoid: '(or Use with Caution):** - **In Advertising and Branding:** Be aware that marketers are professional Pavlovian conditioners, attempting to associate their products with feelings of happiness, success, or security. - **When Forming First Impressions:** Our brains quickly associate superficial traits with deep character judgments based on past experiences. Fight the urge to make snap judgments based on these initial, often irrelevant, associations. - **In Financial Markets:** A rising stock price can act as a \"bell,\" triggering a FOMO \"salivation\" in investors, causing them to buy for emotional reasons rather than a rational analysis of value.',
    keywords: ["Marketing", "branding", "political campaigns", "product design", "first impressions", "stock market bubbles"],
    steps: ["Identify a Strong Emotional Reaction:: Notice when you have a gut feeling (positive or negative) about something.", "Isolate the Trigger:: Ask: \\\"Is this reaction based on the direct merits of the situation, or is it being triggered by an associated symbol, sound, or memory?\\\"", "Trace the Association:: Where did this link come from? What past experience created this conditioned response?", "Separate the Association from Reality:: Evaluate the current situation on its own terms. Consciously decouple the trigger from the object of your judgment.", "Decide Rationally:: Make a choice based on the fundamentals, not on the conditioned emotional response."],
    coaching: ["\\\"Is our positive feeling for this project due to its actual merits, or because it\\'s being presented by someone we like?\\\"", "\\\"Are we rejecting this idea because it\\'s bad, or because it reminds us of a previous failure?\\\"", "\\\"What is the \\'bell\\' in this situation that is making us \\'salivate\\'?\\\"", "\\\"Let\\'s strip away the branding, the logo, and the celebrity endorsement. What is the actual value of the product underneath?\\\"", "\\\"Is the market\\'s enthusiasm for this asset based on solid fundamentals, or is it a purely Pavlovian response to recent price increases?\\\""]
  },
  'm79': {
    title: 'Tendency to Feel Envy & Jealousy',
    title_en: 'Tendency to Feel Envy & Jealousy',
    category: 'Human Nature',
    description: 'Envy is the painful feeling of wanting what someone else has. Jealousy is the fear of losing what you have to someone else. These are powerful, primal emotions that are deeply wired into human nature. They can drive otherwise irrational behavior, from self-destructive acts to destabilizing entire organizations, as people\'s sense of fairness and relative status is violated.',
    avoid: '(or Use with Caution):** - **When Designing Incentive Systems:** Any system of compensation or promotion that is perceived as opaque or unfair will breed envy and resentment, which can destroy morale and productivity. - **When Consuming Social Media:** Be aware that platforms like Instagram and LinkedIn are engines for generating envy by showcasing curated, often unrealistic, versions of others\' lives and successes. - **In Team Dynamics:** When assigning credit or rewards, be mindful of how perceptions of favoritism or unfairness can trigger envy and undermine collaboration.',
    keywords: ["Salary negotiations", "team management", "social status", "sibling rivalry", "organizational politics", "social media"],
    steps: ["Acknowledge the Emotion:: Recognize the feeling of envy or jealousy in yourself without judgment. It\\'s a natural human response.", "Identify the Trigger:: Pinpoint the specific comparison that is causing the emotion. What, exactly, do you covet?", "Reframe from Comparison to Your Own Path:: Shift your focus from what others have to your own goals and progress. The key question is not \\\"Am I doing better than them?\\\" but \\\"Am I doing better than I was yesterday?\\\"", "Anticipate Envy in Systems:: When designing any system that allocates resources or status (e.g., compensation, promotions), prioritize procedural fairness and transparency. Unequal outcomes are more easily accepted if the process is seen as fair.", "Address the Underlying Feeling:: When you observe envy in others, look past the complaint to the underlying feeling of unfairness or being undervalued."],
    coaching: ["\\\"Is our strategy being driven by our own goals or by a desire to \\'beat\\' a competitor out of envy?\\\"", "\\\"How might this new compensation plan be perceived by employees? Where are the potential envy hotspots?\\\"", "\\\"Are we making this decision to be fair, or to be equal? What\\'s the difference in this context?\\\"", "\\\"Is my negative reaction to this person\\'s success about them, or is it about my own insecurities?\\\"", "\\\"Instead of looking at what they have, what is the next productive step on our own path?\\\""]
  },
  'm80': {
    title: 'Liking/Disliking Tendency',
    title_en: 'Liking/Disliking Tendency',
    category: 'Human Nature',
    description: 'This model describes our tendency to distort our thinking in favor of people or things we like and against those we dislike. We are wired to overlook the faults of our friends and the virtues of our enemies. This \"halo effect\" (or its opposite, the \"horns effect\") is a mental shortcut that saves energy but often leads to poor judgments, causing us to overrate things we like and underrate things we dislike.',
    avoid: '(or Use with Caution):** - **During Hiring and Performance Reviews:** We naturally overrate the skills of people we find socially charming and underrate those we don\'t, regardless of their actual competence. - **When Evaluating Arguments:** We tend to uncritically accept ideas from people and groups we like and automatically reject them from those we dislike, without ever engaging with the substance of the argument itself. - **In Political and Social Debates:** This tendency is a primary driver of polarization, as it encourages judging ideas based on the \"tribe\" they come from rather than their merit.',
    keywords: ["Hiring", "performance reviews", "political analysis", "team selection", "debates", "halo effect"],
    steps: ["Acknowledge Your Feelings:: Be honest with yourself. Do you have a pre-existing positive or negative feeling about the person, group, or idea being discussed?", "Separate the Messenger from the Message:: Consciously decouple the source of the idea from the idea itself.", "Apply Uniform Standards:: Force yourself to find potential flaws in arguments you like and potential virtues in arguments you dislike. A good practice is \\\"steel-manning\\\" — making the strongest possible case for the side you disagree with.", "Use a \\\"Reversal Test\\\":: Ask yourself: \\\"If my biggest rival proposed this, would I still support it?\\\" or \\\"If my closest ally did this, would I still condemn it?\\\"", "Judge Based on Merits:: Make your final assessment based on the objective facts and logic, not your feelings about the source."],
    coaching: ["\\\"Let\\'s set aside our feelings about this team for a moment. What are the objective merits of their proposal?\\\"", "\\\"Are we giving this idea a fair hearing, or are we dismissing it because of where it came from?\\\"", "\\\"Would we be this critical of this project if it were proposed by a team we liked more?\\\"", "\\\"Can you make the strongest possible argument *for* the position you dislike? What does that reveal?\\\"", "\\\"Is it possible we are overvaluing their strengths simply because we like them as a person?\\\""]
  },
  'm81': {
    title: 'Denial',
    title_en: 'Denial',
    category: 'Human Nature',
    description: 'Denial is a psychological defense mechanism in which a person refuses to acknowledge a reality that is too painful or threatening to accept. The mind protects itself from overwhelming facts or emotions by rejecting them. While it can be a temporary coping mechanism, prolonged denial prevents necessary action and allows problems to fester and grow.',
    avoid: '(or Use with Caution):** - **When Receiving Negative Feedback:** The first instinct when faced with poor results or critical feedback is often to deny the validity of the data or the source. - **In a Slowly Escalating Crisis:** Denial is common when dealing with a gradually worsening situation (a declining business, a health issue, a failing project). It allows us to ignore the problem until it becomes catastrophic. - **When Facts Challenge Core Beliefs:** We are prone to denying any evidence that contradicts our deeply held identity or worldview, as accepting it would be too psychologically costly.',
    keywords: ["Addiction", "grief", "business turnarounds", "个人财务", "receiving feedback", "crisis management"],
    steps: ["Identify a Painful Reality:: Notice a situation where the facts feel threatening or deeply uncomfortable.", "Question Your Inertia:: Ask, \\\"Is my inaction in this situation a conscious choice, or am I refusing to see the problem clearly?\\\"", "Seek Disconfirming Evidence:: Actively look for data and opinions that challenge your preferred narrative. Talk to people who you know will give you the unvarnished truth.", "Conduct a \\\"Pre-Mortem\\\":: Imagine it\\'s one year from now and this project/company/situation has failed spectacularly. What was the most likely cause? Often, the cause is the uncomfortable truth you are currently denying.", "Separate Acknowledgment from Action:: Your first step is not to solve the problem, but simply to acknowledge the reality of it. \\\"The numbers are what they are.\\\" \\\"This is happening.\\\" Only then can you move to effective action."],
    coaching: ["\\\"What is the brutal truth of this situation that we are all afraid to say out loud?\\\"", "\\\"If an outsider with no emotional attachment were to look at these facts, what would they conclude?\\\"", "\\\"Are we engaged in wishful thinking, or do we have a real plan to address this?\\\"", "\\\"What evidence would it take to convince us that our current belief is wrong?\\\"", "\\\"Let\\'s assume the worst-case scenario is true. What is the very first step we should take?\\\""]
  },
  'm82': {
    title: 'Availability Heuristic',
    title_en: 'Availability Heuristic',
    category: 'Human Nature',
    description: 'The Availability Heuristic is a mental shortcut where we judge the likelihood and importance of an event based on how easily examples come to mind. If something is recent, vivid, or emotionally charged, our brain assumes it is more common or important than it actually is. This leads to skewed perceptions of risk, frequency, and reality.',
    avoid: '(or Use with Caution):** - **When Assessing Risk:** After a major news event (like a plane crash or shark attack), we overestimate the probability of that event happening to us because the memory is so vivid and available, even if the statistical reality is unchanged. - **In Strategic Planning:** Teams often overemphasize recent successes or failures when forecasting future performance, assuming the recent past is more representative of the future than it really is. - **When Using Anecdotal Evidence:** A single, powerful story (\"My uncle smoked his whole life and lived to 95\") is more available and often feels more persuasive than robust statistical data, leading to poor decisions.',
    keywords: ["Risk assessment", "战略规划", "news consumption", "医疗诊断", "financial investment", "anecdotal evidence."],
    steps: ["Identify the Judgment:: What assessment of risk, frequency, or probability are you making?", "Analyze What Comes to Mind:: What specific examples or stories are informing this judgment?", "Question Their Availability:: Is this information top-of-mind because it\\'s statistically common, or simply because it was recent, vivid, shocking, or repeated often?", "Seek Out the Base Rates:: Actively look for the actual statistics and long-term data. Go beyond the memorable anecdotes and find the boring, aggregate numbers.", "Adjust Your Judgment:: Deliberately give more weight to the boring statistical data and less to the exciting, available stories. Correct your gut feeling with the evidence."],
    coaching: ["\\\"Are we making this decision based on this one recent, vivid example, or on the long-term data?\\\"", "\\\"We all remember that one catastrophic failure, but what do the statistics say is the *actual* failure rate?\\\"", "\\\"Is this a real trend, or are we just noticing it more because it\\'s been in the headlines lately?\\\"", "\\\"We\\'re relying on a single anecdote to guide our policy. Where can we find the base rate for this kind of event?\\\"", "\\\"Forget what comes to mind easily for a moment. What do the hard, boring numbers tell us?\\\""]
  },
  'm83': {
    title: 'Representativeness Heuristic',
    title_en: 'Representativeness Heuristic',
    category: 'Human Nature',
    description: 'The Representativeness Heuristic is a mental shortcut where we classify something based on how similar it is to a typical case or stereotype we hold in our mind. We judge by resemblance, asking \"how much does this look like X?\" instead of asking \"what is the statistical probability of X?\" This leads us to ignore base rates, fall for detailed but improbable stories (the conjunction fallacy), and rely too heavily on stereotypes.',
    avoid: '(or Use with Caution):** - **When Making Judgments About People:** We might assume a quiet, studious person is a librarian because they fit the stereotype, ignoring the fact that there are vastly more salespeople (the base rate). - **In Financial Analysis:** A company might seem \"representative\" of the next big thing (e.g., charismatic founder, disruptive story), causing us to ignore the massive base rate of startup failures. - **In Medical Diagnosis:** A set of symptoms might seem to perfectly represent a rare, \"textbook\" disease, causing a doctor to overlook a much more common illness that is statistically more likely.',
    keywords: ["Stereotyping", "first impressions", "财务预测", "hiring", "医疗诊断", "conspiracy theories"],
    steps: ["Identify Your Judgment:: What category are you placing this person or event into?", "Identify the Stereotype:: What \\\"typical case\\\" or mental model is this judgment based on? (e.g., \\\"This looks just like a classic startup success story.\\\")", "Find the Base Rate:: Actively ignore the compelling narrative and find the statistical reality. How many startups actually succeed? What is the actual prevalence of this disease?", "Beware the Conjunction Fallacy:: A more detailed and specific story always feels more plausible, but is always less probable. Remember that P(A and B) can never be greater than P(A).", "Correct Your Judgment:: Base your final assessment on the statistical reality (the base rate), not on how well the situation \\\"represents\\\" a familiar story."],
    coaching: ["\\\"This person seems to fit our stereotype of a \\'maverick genius,\\' but what is the actual base rate of success for people with that profile?\\\"", "\\\"Are we falling in love with a good story, or are we looking at the statistical odds?\\\"", "\\\"This explanation is very detailed and specific, which makes it compelling. But is it more *probable* than a simpler, more boring explanation?\\\"", "\\\"We are treating this like a textbook case, but what do the numbers say is the most common cause of this particular issue?\\\"", "\\\"Let\\'s ignore the narrative for a second. What are the raw probabilities we\\'re dealing with?\\\""]
  },
  'm84': {
    title: 'Social Proof',
    title_en: 'Social Proof',
    category: 'Human Nature',
    description: 'Social Proof is the deep-seated psychological tendency to assume that the actions of others reflect the correct behavior for a given situation. When we are uncertain, we look to the crowd for guidance. This instinct for conformity allows for social cohesion and cooperation, but it can also lead to herd behavior, investment bubbles, and the bystander effect, where everyone assumes someone else will act.',
    avoid: '(or Use with Caution):** - **In Financial Markets:** Herd behavior is a primary driver of bubbles and crashes. The fact that \"everyone\" is buying an asset is often a warning sign of a mania, not a signal of a good investment. - **When Judging New Ideas:** Popularity is not a proxy for quality. Many great ideas are unpopular at first, and many bad ideas become fads through social proof. Don\'t mistake consensus for correctness. - **In Emergency or Ambiguous Situations:** Social proof can lead to the \"bystander effect,\" where individuals in a crowd fail to act because they see others doing nothing and incorrectly infer that the situation is not an emergency.',
    keywords: ["Herd behavior", "groupthink", "investment bubbles", "marketing fads", "bystander effect", "social conformity"],
    steps: ["Identify the Influence:: Recognize when your judgment or decision is being swayed by the actions or opinions of a larger group.", "Question the Crowd\\'s Knowledge:: Ask yourself, \\\"Do these people have superior information, or are they just copying each other?\\\" In many manias, everyone is just looking at everyone else.", "Think from First Principles:: Temporarily ignore the actions of others. Based on the objective facts available to you, what is the rational course of action?", "Seek Dissenting Opinions:: Find the person who is not following the herd and understand their reasoning. The dissenting view is often the most valuable.", "Act Independently:: If you determine the crowd is wrong, you must have the courage to act independently. The cost of being wrong with the herd is often higher than the cost of being right alone."],
    coaching: ["\\\"Is this a genuinely good idea, or is it just a popular idea right now?\\\"", "\\\"What evidence do we have besides the fact that \\'everyone else is doing it\\'?\\\"", "\\\"If we were the only company in the world looking at this, would we still make this same decision?\\\"", "\\\"Is this a signal of genuine market demand, or are we just observing herd behavior?\\\"", "\\\"Let\\'s assume for a moment that the entire crowd is mistaken. What would that look like?\\\""]
  },
  'm85': {
    title: 'Narrative Instinct',
    title_en: 'Narrative Instinct',
    category: 'Human Nature',
    description: 'Often called the \"storytelling animal,\" humans have a deep instinct to make sense of the world by constructing and interpreting narratives. We prefer a compelling story to raw data, and our minds automatically impose a narrative structure—with heroes, villains, causes, and effects—onto random or complex events. This helps us create meaning but can lead to major errors in judgment when the story is more appealing than the truth.',
    avoid: '(or Use with Caution):** - **When Investing:** We fall for \"story stocks,\" where a compelling narrative about the future (e.g., \"this company will change the world\") distracts us from the boring financial realities. - **In Management and Strategy:** A good story about a project\'s potential can make us ignore the flaws in the plan. We prefer the narrative of a heroic comeback to the reality of a slow, difficult grind. - **When Interpreting Randomness:** We see trends and patterns in random data because our mind wants to create a story of cause and effect where none exists (e.g., \"the market is up because of X\").',
    keywords: ["Story stocks", "商业战略", "conspiracy theories", "historical analysis", "journalism", "self-deception."],
    steps: ["Identify the Narrative:: Recognize the story you are telling yourself or being told. What are the key elements: the hero, the goal, the obstacle?", "Deconstruct the Story:: Separate the verifiable facts from the narrative interpretation. What are the raw, unadorned data points?", "Consider Alternative Narratives:: Could the same set of facts support a different, less appealing story? What if there is no story, and these are just random events?", "Focus on the \\\"Why Not\\\":: The best stories are often about why something will succeed. Force yourself to explore the non-narrative, statistical reasons it might fail (the \\\"base rate\\\").", "Trust the Data Over the Story:: When in conflict, a compelling narrative should lose to boring, robust data. Prioritize spreadsheets over stories."],
    coaching: ["\\\"This is a great story, but what are the actual numbers telling us?\\\"", "\\\"Are we funding a solid plan or just a compelling narrative?\\\"", "\\\"What if there is no \\'why\\' behind this? What if this is just random noise?\\\"", "\\\"Let\\'s take all the emotional, storytelling language out of this pitch. What\\'s left?\\\"", "\\\"Could we construct an equally plausible story where this all ends in disaster? What would that be?\\\""]
  },
  'm86': {
    title: 'Curiosity Instinct',
    title_en: 'Curiosity Instinct',
    category: 'Human Nature',
    description: 'Curiosity is the intrinsic desire to learn or know about something. This powerful instinct drives exploration, discovery, and innovation. It is the engine of science and the foundation of all deep knowledge. While other instincts often seek comfort and safety, curiosity drives us to explore the unknown, even without an immediate, tangible reward.',
    avoid: '(or Use with Caution):** - **When It Becomes \"Infotainment\":** Be cautious of curiosity that is purely for entertainment and doesn\'t lead to deeper understanding or action. This is curiosity as a form of consumption, not investment. - **When It Leads Down Unproductive Rabbit Holes:** Curiosity needs to be balanced with discipline. Unfocused curiosity can lead to a shallow understanding of many things and a deep understanding of none. - **When It Overrides More Pressing Priorities:** While valuable, curiosity should not be an excuse to procrastinate on more important, albeit less interesting, tasks.',
    keywords: ["Research", "innovation", "learning", "exploration", "problem-finding", "intellectual humility"],
    steps: ["Notice the \\\"Itch\\\":: Pay attention to the feeling of wanting to know more. What question has hooked your mind?", "Follow it Systematically:: Don\\'t just passively consume. Actively seek answers. Ask \\\"Why?\\\" repeatedly. Go to primary sources.", "Connect it to Your Circle of Competence:: How does this new knowledge connect to what you already know? Does it expand your circle, or is it a random tangent?", "Distinguish Between \\\"Productive\\\" and \\\"Passive\\\" Curiosity:: Is this inquiry building a useful skill or understanding, or is it just a way to pass the time?", "Turn Curiosity into Action:: The ultimate goal of curiosity is not just to know, but to do. How can you apply this new knowledge? How can you test it?"],
    coaching: ["\\\"What is the most important question in this area that we don\\'t currently have an answer for?\\\"", "\\\"Let\\'s follow that thread of curiosity. Where does it lead us?\\\"", "\\\"Is this line of questioning helping us solve the core problem, or is it a distraction?\\\"", "\\\"What are we taking for granted that we should be more curious about?\\\"", "\\\"How can we create an environment where intelligent questions are encouraged and rewarded?\\\""]
  },
  'm87': {
    title: 'Language Instinct',
    title_en: 'Language Instinct',
    category: 'Human Nature',
    description: 'Pioneered by linguist Noam Chomsky and popularized by psychologist Steven Pinker, the Language Instinct is the idea that the ability to acquire and use complex, grammatical language is a hardwired, biological human trait, not just a cultural invention. Language is the operating system for our thoughts, allowing us to reason, plan, cooperate, and create shared narratives on a scale no other species can match.',
    avoid: '(or Use with Caution):** - **When Faced with Jargon and Obfuscation:** Language can be used to intimidate, confuse, and obscure rather than clarify. Be wary of complex language when a simple explanation would suffice; it is often a sign of someone hiding a lack of understanding. - **When Using Euphemisms:** Pay attention to language that is designed to soften a harsh reality (e.g., \"right-sizing\" instead of \"firing,\" \"collateral damage\" instead of \"civilian deaths\"). Euphemisms can mask the true nature of a decision. - **When Persuasive Language is at Play:** Be aware of how rhetoric, framing, and emotional language can be used to sway your opinion, independent of the logical merit of the argument.',
    keywords: ["Communication", "谈判", "politics", "marketing", "contracts", "public speaking"],
    steps: ["Define Your Terms:: The first step in any intelligent discussion is to make sure all parties are using the same words to mean the same things. Force a clear definition of key terms upfront.", "Translate Jargon into Simple Language:: If you can\\'t explain it simply, you don\\'t understand it well enough. Force yourself or others to translate jargon into plain English.", "Question Loaded Language:: Identify words that are designed to evoke an emotional response rather than convey precise meaning.", "Distinguish Between the Map and the Territory:: Remember that the words used to describe a situation (the map) are not the situation itself (the territory). Don\\'t get lost in semantic debates.", "Listen to What Is *Not* Said:: Sometimes the most important information is what is being omitted or glossed over."],
    coaching: ["\\\"What do we actually *mean* by that term? Let\\'s define it precisely.\\\"", "\\\"Can you explain that to me as if I were a five-year-old?\\\"", "\\\"Is this language designed to clarify the issue or to confuse it?\\\"", "\\\"Let\\'s rephrase this statement without the emotionally charged words. What is it actually saying?\\\"", "\\\"Are we arguing about the reality of the situation, or just about the words we\\'re using to describe it?\\\""]
  },
  'm88': {
    title: 'First-Conclusion Bias',
    title_en: 'First-Conclusion Bias',
    category: 'Human Nature',
    description: 'This bias describes our tendency to settle on the first conclusion that comes to mind and then, as Charlie Munger puts it, our mind \"shuts.\" We grab the first plausible explanation and then stop thinking, becoming resistant to alternative ideas. This is an energy-saving mental shortcut, but it\'s a major barrier to critical thinking and often leads to simplistic and wrong answers.',
    avoid: '(or Use with Caution):** - **During Brainstorming and Strategy:** The first idea presented is often the most conventional one. Locking onto it prematurely kills innovation and prevents the exploration of better, non-obvious solutions. - **In Debugging and Problem-Solving:** When troubleshooting, the first apparent cause of a problem is often just a symptom. This bias leads us to fix the symptom while ignoring the deeper root cause. - **In Medical or Scientific Diagnosis:** A doctor or scientist who latches onto the first plausible diagnosis may fail to consider other possibilities, leading them to miss the correct explanation.',
    keywords: ["Brainstorming", "debugging", "diagnosis", "investigation", "决策制定", "anchoring."],
    steps: ["Don\\'t Decide Immediately:: When faced with a problem, consciously pause. Don\\'t let yourself lock onto the first explanation that pops into your head.", "Generate Multiple Competing Hypotheses:: Force yourself to come up with at least three to five plausible explanations for the same set of facts. This breaks the \\\"first-conclusion\\\" lock.", "Seek Disconfirming Evidence:: For your favorite or first hypothesis, actively try to disprove it. What evidence would show that it\\'s wrong? (This is related to Falsification).", "Gather More Information:: Don\\'t just analyze the information you have; ask what information is missing that could help you differentiate between your hypotheses.", "Decide Based on a Comparative Evaluation:: Choose the best explanation from your list of alternatives, not just the first one that came to mind."],
    coaching: ["\\\"That\\'s one plausible explanation. What are two other possibilities?\\\"", "\\\"Let\\'s assume our initial conclusion is wrong. What else could be causing this?\\\"", "\\\"What\\'s the single best piece of evidence that could convince us we\\'re mistaken?\\\"", "\\\"We\\'ve all seemed to agree on this pretty quickly. What might we be missing?\\\"", "\\\"Before we commit to this path, let\\'s spend 10 minutes trying to come up with a better one.\\\""]
  },
  'm89': {
    title: 'Overgeneralizing from Small Samples',
    title_en: 'Overgeneralizing from Small Samples',
    category: 'Human Nature',
    description: 'This is the tendency to draw broad conclusions from a small amount of data. Our minds are quick to create a general rule from just a few examples, forgetting the statistical rule of the Law of Large Numbers, which states that only a large sample size will reliably reflect the true average. We mistakenly believe in a \"Law of Small Numbers,\" assuming that a small sample is just as representative as a large one.',
    avoid: '(or Use with Caution):** - **When Interpreting \"The Data\":** A study based on a tiny or unrepresentative sample can be worse than no data at all, as it gives the illusion of certainty where none exists. - **When Acting on Early User Feedback:** The first few customers who provide feedback on a new product are often not representative of the broader market. Overreacting to their specific complaints is a common mistake. - **When Relying on Personal Experience:** We tend to generalize our own unique experiences to the wider world. (\"In my experience, all X are Y.\") This is a sample size of one, which is statistically meaningless.',
    keywords: ["Statistics", "survey data", "user feedback", "anecdotal evidence", "market research", "law of large numbers."],
    steps: ["Identify the Conclusion:: What general rule or conclusion is being drawn?", "Examine the Sample Size:: How many data points is this conclusion based on? Is it 3, 30, or 3,000?", "Assess the Sample\\'s Representativeness:: Is this small sample likely to be representative of the entire population? Why or why not? Who is *not* included in this sample?", "Seek Larger, More Robust Data:: Instead of relying on the small, available sample, actively look for more comprehensive data, like base rates or larger studies.", "Express Uncertainty:: If a decision must be made on a small sample, explicitly state the low level of confidence. Treat the conclusion as a weak hypothesis, not a proven fact."],
    coaching: ["\\\"What\\'s the sample size for this data? Is it large enough to be meaningful?\\\"", "\\\"We\\'ve heard this from two customers. Do we have any reason to believe they represent the other 99.8% of our user base?\\\"", "\\\"Is this conclusion based on a robust data set, or are we just generalizing from a few recent anecdotes?\\\"", "\\\"This survey seems to confirm our belief, but who did they survey? And how many people?\\\"", "\\\"How much money are we willing to bet that this tiny sample accurately reflects the entire market?\\\""]
  },
  'm90': {
    title: 'Relative Satisfaction',
    title_en: 'Relative Satisfaction',
    category: 'Human Nature',
    description: 'Our brains do not judge our well-being in absolute terms, but in relative terms. Our sense of happiness or misery is determined not by our objective circumstances, but by how those circumstances compare to our expectations, our past, or the situation of our peers. This is why a pay raise can feel good for a week, and then feel normal, or why seeing a neighbor\'s new car can diminish the joy we get from our own.',
    avoid: '(or Use with Caution):** - **When Making Career and Life Choices:** Chasing a goal simply to \"keep up with the Joneses\" is a recipe for misery, as the finish line is always moving. You are outsourcing your happiness to the choices of others. - **When Setting Goals:** Be careful about setting expectations. If happiness is the gap between reality and expectations, then unrealistically high expectations can guarantee misery, even with great objective success. - **When Using Social Media:** Social media is an engine for relative misery, constantly presenting you with a curated, superior version of everyone else\'s life, which distorts your own sense of well-being.',
    keywords: ["Happiness", "goal setting", "social comparison", "lifestyle inflation", "hedonic treadmill", "keeping up with the Joneses."],
    steps: ["Recognize the Comparison:: When you feel a pang of dissatisfaction or envy, identify the comparison you are making. Are you comparing yourself to your past self, a peer, or an idealized expectation?", "Shift to an Absolute Metric:: Instead of relative comparison, try to use an absolute benchmark. \\\"Do I have enough to be healthy and safe?\\\" \\\"Is my progress aligned with my own values?\\\"", "Practice Gratitude:: Actively focus on what you have in absolute terms, not on what you lack in relative terms. This is a direct counter-measure to the relative satisfaction tendency.", "Manage Your Inputs:: Be conscious of the information you consume. Curate your social media feeds and information diet to reduce exposure to unhealthy comparisons.", "Compare Yourself to Your Past Self:: If you must compare, the most productive comparison is to your past self. Are you making progress on your own terms?"],
    coaching: ["\\\"Is this goal based on our own intrinsic values, or are we just trying to keep up with a competitor?\\\"", "\\\"If we achieve this, will we be satisfied, or will we just create a new, higher benchmark for our dissatisfaction?\\\"", "\\\"Are we judging our success on our own terms, or on terms set by others?\\\"", "\\\"Let\\'s ignore what our peers are doing for a moment. What is the right decision for us, in absolute terms?\\\"", "\\\"What if we defined \\'enough\\' as an absolute number, instead of just \\'more than them\\'?\\\""]
  },
  'm91': {
    title: 'Commitment & Consistency Bias',
    title_en: 'Commitment & Consistency Bias',
    category: 'Human Nature',
    description: 'This bias is our deep-seated need to be, and to appear, consistent with what we have already done or said. Once we make a choice or take a stand, we face personal and interpersonal pressure to behave consistently with that commitment. This allows for social trust and cohesion, but it can also lead us to stick with bad decisions long after they should have been abandoned, simply to avoid the psychological discomfort of inconsistency.',
    avoid: '(or Use with Caution):** - **In Long-Term Projects (\"Sunk Costs\"):** We continue to pour time, money, and energy into failing projects because we are already committed, instead of cutting our losses. The previous investment feels like a commitment that must be honored. - **After Making a Public Statement:** Once we declare something publicly, our desire to remain consistent makes it very difficult to change our minds, even in the face of overwhelming new evidence. - **When a Belief Becomes Part of Your Identity:** When a belief becomes \"who I am\" (e.g., \"I am a value investor\"), it becomes nearly impossible to evaluate contradictory evidence fairly. To question the belief is to question your identity.',
    keywords: ["Sunk cost fallacy", "cognitive dissonance", "identity", "public statements", "long-term projects", "brand loyalty."],
    steps: ["Identify the Prior Commitment:: What past decision, statement, or belief is influencing your current choice?", "Separate the Past from the Future:: Acknowledge any sunk costs (time, money, effort) as gone forever. They cannot be recovered.", "Evaluate the Decision on Today\\'s Merits:: Ask the key question: \\\"Knowing what I know now, if I were starting from scratch today, would I still make this same choice?\\\"", "Give Yourself Permission to Be Inconsistent:: Frame changing your mind as a sign of strength and learning, not weakness. As John Maynard Keynes supposedly said, \\\"When the facts change, I change my mind. What do you do, sir?\\\"", "Decide Based on Future Outcomes:: Make your decision based purely on where you want to go from here, not on where you have been."],
    coaching: ["\\\"Are we continuing this project because it\\'s still a good idea, or because we\\'ve already invested so much in it?\\\"", "\\\"Let\\'s ignore all our past decisions for a moment. Knowing what we know right now, what is the best path forward?\\\"", "\\\"Is it possible that we are sticking with this plan just to avoid admitting we were wrong?\\\"", "\\\"What would it take for us to change our minds on this? What evidence would we need to see?\\\"", "\\\"Is this belief serving us, or are we serving it?\\\""]
  },
  'm92': {
    title: 'Hindsight Bias',
    title_en: 'Hindsight Bias',
    category: 'Human Nature',
    description: 'Hindsight Bias is the tendency, after an event has occurred, to see the event as having been predictable, despite there having been little or no objective basis for predicting it. Once we know the outcome, we unconsciously rewrite our own memories and believe we \"knew it all along.\" This prevents us from accurately learning from the past, as we mistake good luck for good judgment and bad luck for stupidity.',
    avoid: '(or Use with Caution):** - **When Conducting Performance Reviews or Post-Mortems:** We unfairly judge past decisions based on information that was not available to the decision-maker at the time. \"You should have known\" is the classic cry of hindsight bias. - **When Analyzing History or Current Events:** We create neat, linear narratives to explain past events, making them seem inevitable and simple when, in reality, they were complex, chaotic, and uncertain. - **When Evaluating Your Own Past Decisions:** This bias makes it difficult to learn from your mistakes because you aren\'t honest with yourself about how uncertain you truly were in the moment.',
    keywords: ["Post-mortems", "performance reviews", "historical analysis", "learning from failure", "决策制定", "\\\"I knew it all along.\\\""],
    steps: ["Use a Decision Journal:: Before making a significant decision, write down what you expect to happen and why. This creates a record of your actual thought process, immune to future hindsight bias.", "Judge the Process, Not the Outcome:: A good decision can have a bad outcome, and a bad decision can get lucky. Evaluate a choice based on the quality of the reasoning at the time, not on the result.", "Conduct \\\"Pre-Mortems,\\\" Not Just Post-Mortems:: Before starting a project, imagine it has failed and ask \\\"Why?\\\" This forces you to consider risks before they become \\\"obvious\\\" in hindsight.", "Reconstruct the Uncertainty:: When looking back, force yourself to recall all the other plausible outcomes that could have happened but didn\\'t. Actively fight the narrative of inevitability.", "Acknowledge the Role of Luck:: Recognize that luck, chance, and randomness play a huge role in most outcomes."],
    coaching: ["\\\"Let\\'s forget the outcome for a minute. Based on what they knew *at the time*, was this a reasonable decision to make?\\\"", "\\\"What were the other plausible scenarios we were considering that didn\\'t happen?\\\"", "\\\"Are we learning from this failure, or are we just blaming people for not being able to predict the future?\\\"", "\\\"Before we start, let\\'s write down our assumptions. What do we believe will happen, and with what level of confidence?\\\"", "\\\"How much of this successful outcome was due to skill, and how much was just good luck?\\\""]
  },
  'm93': {
    title: 'Sensitivity to Fairness',
    title_en: 'Sensitivity to Fairness',
    category: 'Human Nature',
    description: 'Humans have a deep, innate sensitivity to fairness. We are not purely self-interested actors; we care about just outcomes and will often punish unfair behavior, even at a personal cost. This instinct is critical for building trust and enabling long-term cooperation. However, \"fairness\" is often subjective and based on shifting social norms, making it a frequent source of conflict.',
    avoid: '(or Use with Caution):** - **In Negotiations:** An offer that is objectively good may be rejected if it is perceived as unfair. People will often accept a worse outcome for themselves just to punish an opponent they see as greedy. - **When Making Policy or Rules:** The perception of procedural fairness (is the process just?) is often more important than the perception of outcome fairness (do I like the result?). A decision is more likely to be accepted if people believe the process for making it was fair. - **In Team and Organizational Management:** Perceptions of unfairness in compensation, promotion, or workload are among the most corrosive forces in an organization, destroying morale and trust.',
    keywords: ["Negotiation", "social justice", "organizational politics", "compensation", "public policy", "game theory"],
    steps: ["Acknowledge the Emotion:: Recognize that feelings of \\\"unfairness\\\" are powerful and cannot be dismissed with pure logic.", "Distinguish Process vs. Outcome:: Is the objection about the final result, or about the process used to get there? Focusing on procedural justice is often the key.", "Make the Principles Explicit:: Clearly define the principles being used to make a decision *before* the decision is made. What does \\\"fair\\\" mean in this context?", "Take the Other\\'s Perspective:: Why might the other party perceive this situation as unfair? Make their argument for them as strongly as you can.", "Separate \\\"Fair\\\" from \\\"Equal\\\":: Not all unequal outcomes are unfair. Sometimes, fairness means that people are treated differently based on their contributions, needs, or past actions."],
    coaching: ["\\\"Are we focused on making a fair deal, or just on winning?\\\"", "\\\"What\\'s the principle we are using to make this decision? Can we apply it consistently?\\\"", "\\\"Even if people don\\'t like the outcome, will they feel that the process for getting here was fair?\\\"", "\\\"From their point of view, what would a \\'fair\\' outcome look like? Why?\\\"", "\\\"Are we confusing what is \\'fair\\' with what is \\'equal\\'?\\\""]
  },
  'm94': {
    title: 'Fundamental Attribution Error',
    title_en: 'Fundamental Attribution Error',
    category: 'Human Nature',
    description: 'This is our tendency to explain someone\'s behavior by their internal character (\"that\'s who they are\") while underestimating the power of their situation and context. We attribute our own failures to the situation (\"I was having a bad day\"), but we attribute others\' failures to their personality (\"they are incompetent\"). This leads us to make harsh judgments about others and to be blind to the situational factors influencing our own behavior.',
    avoid: '(or Use with Caution):** - **When Judging a Colleague\'s Performance:** Before concluding someone is lazy or incompetent, consider the situational factors that might be affecting them: a difficult project, a family crisis, or unclear instructions. - **When Evaluating a Leader or Public Figure:** We tend to see their actions as a direct reflection of their character, ignoring the immense situational pressures, constraints, and incentives they are operating under. - **When Explaining Your Own Success:** We tend to attribute our successes to our own brilliance and character, while conveniently ignoring the role of luck, privilege, and situational advantages.',
    keywords: ["Performance reviews", "character judgments", "leadership analysis", "understanding behavior", "\\\"actor-observer\\\" bias."],
    steps: ["Identify the Attribution:: How are you explaining a specific behavior? Are you attributing it to the person\\'s character or to their situation?", "\\\"Look Out the Window\\\":: Force yourself to consider the external, situational factors first. What pressures, constraints, or incentives might be shaping this person\\'s actions?", "\\\"Look in the Mirror\\\":: When explaining your own behavior, reverse the process. Start by questioning your own character traits or biases before jumping to situational excuses.", "Use the \\\"Reversal Test\\\":: If you saw someone else behaving in the exact same way you are, how would you judge them? If you were in their exact situation, how might you behave?", "Assume Good Intentions (Hanlon\\'s Razor):: Before attributing a negative outcome to someone\\'s bad character, first consider if it could be explained by situational factors you don\\'t fully understand."],
    coaching: ["\\\"Are we judging their character, or are we analyzing the situation they were in?\\\"", "\\\"Let\\'s assume this person is smart and rational. What in their environment could have led them to behave this way?\\\"", "\\\"If we put a different person in that exact same situation, would we expect a different outcome?\\\"", "\\\"Before we blame the individual, have we done everything we can to create a situation where they can succeed?\\\"", "\\\"How much of our own success in this area is due to our inherent talent versus the advantages of our situation?\\\""]
  },
  'm95': {
    title: 'Influence of Stress',
    title_en: 'Influence of Stress',
    category: 'Human Nature',
    description: 'Stress, both acute and chronic, fundamentally degrades our ability to think rationally. It triggers a physiological \"fight-or-flight\" response, causing our thinking to become more simplistic, short-term, and reliant on instinct and habit. Under stress, all our other cognitive biases become more pronounced. As the military saying goes, \"You do not rise to the level of your expectations, you fall to the level of your training.\"',
    avoid: '(or Use with Caution):** - **When Making High-Stakes Decisions:** Never make a major, irreversible decision when you are under significant stress, sleep-deprived, or emotionally overwhelmed. Your judgment is compromised. - **In Crisis Management:** The very nature of a crisis induces stress, which narrows focus and encourages hasty decisions. The most important thing to do in a crisis is often to slow down, not speed up. - **In Personal Health and Finance:** Chronic stress leads to poor 长期决策. It encourages seeking immediate relief (unhealthy food, impulsive spending) at the expense of long-term well-being.',
    keywords: ["Crisis management", "high-stakes negotiation", "burnout", "decision fatigue", "emergency situations", "fight-or-flight."],
    steps: ["Recognize the Signs of Stress:: Identify the physiological and mental indicators that you are operating under duress (e.g., shallow breathing, irritability, tunnel vision, racing thoughts).", "Do Not Decide Now:: If possible, postpone any important decision until you are in a calmer state. The first step is to simply not act.", "Fall Back on Training and Checklists:: In situations where you must act under stress, rely on pre-prepared plans, checklists, and heuristics. Do not try to reason from first principles in a crisis.", "Build in Buffers and Circuit Breakers:: Proactively design systems that prevent you from making stress-induced errors. Examples include mandatory waiting periods for major decisions or automatic savings plans.", "Manage Your Physiology:: Actively work to move your body out of a \\\"fight-or-flight\\\" state through techniques like deep breathing, a short walk, or getting some sleep."],
    coaching: ["\\\"Are we making this decision from a place of panic or from a place of calm rationality?\\\"", "\\\"What is our pre-agreed plan for a situation like this? Let\\'s consult the checklist.\\\"", "\\\"Is this an \\'act now\\' situation, or can we sleep on it?\\\"", "\\\"What\\'s one thing we can do right now to reduce the level of stress in this room?\\\"", "\\\"Are we reacting to the immediate pressure, or are we thinking about the second- and third-order consequences?\\\""]
  },
  'm96': {
    title: 'Survivorship Bias',
    title_en: 'Survivorship Bias',
    category: 'Human Nature',
    description: 'Survivorship Bias is the logical error of concentrating on the people or things that \"survived\" some process and inadvertently overlooking those that did not because of their lack of visibility. We see the successful entrepreneurs, the winning strategies, and the ancient buildings that are still standing, and we learn from them. But we don\'t see the thousands of failed entrepreneurs, the identical strategies that failed due to bad luck, or the buildings that collapsed. This leads to an overly optimistic and often misleading understanding of reality.',
    avoid: '(or Use with Caution):** - **When Learning from Business \"Best Practices\":** We study the habits of successful companies like Google and Amazon, but we don\'t study the thousands of failed companies that probably had the exact same habits. The success might be due to luck, not the habits. - **When Taking Career Advice from Famous People:** We listen to advice from college dropouts who became billionaires, forgetting the silent graveyard of thousands of other dropouts who were not so successful. - **When Assessing the \"Quality\" of Old Things:** We assume old cars or buildings were better made than new ones because the few that still exist are in good shape, forgetting that the vast majority of poorly made old things have long since turned to dust.',
    keywords: ["Business strategy", "historical analysis", "selection bias", "statistics", "\\\"silent evidence", "\\\" case studies."],

    category: 'Human Nature',
    description: 'This is the bias for action over inaction. In the face of a problem, our instinct is to *do something*, even if that action is counter-productive or unnecessary. This is driven by a need to feel in control and to demonstrate our value. In many complex systems, however, intervention is the cause of problems, not the solution. The wisdom to \"just sit there\" is rare and valuable.',
