<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芒格思维模型 - 多元思维框架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar .subtitle {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            border-color: #a855f7;
        }

        .search-box::placeholder {
            color: #6b7280;
        }

        .category-section {
            margin-bottom: 20px;
        }

        .category-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .category-items {
            list-style: none;
        }

        .category-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-item:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .category-item.active {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.3), rgba(99, 102, 241, 0.3));
            border-left: 3px solid #a855f7;
        }

        .category-item .check {
            width: 18px;
            height: 18px;
            border: 2px solid #4b5563;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all 0.2s;
        }

        .category-item.learned .check {
            background: #10b981;
            border-color: #10b981;
        }

        .category-item.learned .check::after {
            content: '✓';
            color: white;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #a855f7, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #9ca3af;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        /* 模型卡片 */
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .model-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .model-card:hover {
            transform: translateY(-5px);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.15);
        }

        .model-card.learned {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.05);
        }

        .model-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .model-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }

        .model-category-tag {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.3), rgba(99, 102, 241, 0.3));
            color: #c4b5fd;
        }

        .model-core {
            font-size: 0.95rem;
            color: #a78bfa;
            margin-bottom: 12px;
            font-style: italic;
        }

        .model-description {
            color: #d1d5db;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .model-when {
            background: rgba(168, 85, 247, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .model-when-title {
            font-size: 0.75rem;
            color: #a78bfa;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .model-when-content {
            font-size: 0.85rem;
            color: #c4b5fd;
        }

        .model-steps {
            margin-top: 15px;
        }

        .model-steps-title {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .step-item {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #d1d5db;
        }

        .step-number {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
            color: white;
        }

        .learn-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .learn-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4);
        }

        .learn-btn.learned {
            background: linear-gradient(90deg, #10b981, #059669);
        }

        /* 进度条 */
        .progress-section {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .progress-title {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-text {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #a78bfa;
            text-align: right;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .models-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 隐藏的模型 */
        .model-card.hidden {
            display: none;
        }
    </style>
</head>
